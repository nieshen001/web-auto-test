name: Python Web Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auto_test   # 关键：所有命令都在 auto_test 子目录中执行

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest test_cases/ --alluredir=allure-results --reruns=2 --reruns-delay=1 -n auto

    - name: Install Allure
      run: |
        sudo apt-get install -y allure

    - name: Generate Allure report
      run: |
        allure generate allure-results -o allure-report --clean

    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: auto_test/allure-report   # 注意：artifact 路径需要包含 auto_test 前缀

    - name: Send DingTalk notification
      if: ${{ secrets.DINGTALK_WEBHOOK != '' }}
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        if [ $? -eq 0 ]; then
          RESULT="✅ 测试通过"
        else
          RESULT="❌ 测试失败"
        fi
        curl -X POST $DINGTALK_WEBHOOK -H 'Content-Type: application/json' -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"自动化测试完成\n结果: $RESULT\n仓库: ${{ github.repository }}\n提交: ${{ github.sha }}\"}}"