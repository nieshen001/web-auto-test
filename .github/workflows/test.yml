name: Python Web Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto_test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Chrome and ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    - run: google-chrome --version

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests with parallel execution
      run: |
        pytest test_cases/ --alluredir=allure-results --reruns=2 --reruns-delay=1 -n auto

    - name: Install Allure (official binary)
      run: |
        wget -q -O allure.zip https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.zip
        unzip -q allure.zip -d /tmp/allure
        echo "/tmp/allure/allure-2.27.0/bin" >> $GITHUB_PATH

    - name: Generate Allure report
      run: |
        allure generate allure-results -o allure-report --clean

    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: auto_test/allure-report

    - name: Send DingTalk notification (success)
      if: success() && env.DINGTALK_WEBHOOK != ''
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        curl -X POST $DINGTALK_WEBHOOK -H 'Content-Type: application/json' -d '{"msgtype":"text","text":{"content":"✅ 自动化测试通过\n仓库: ${{ github.repository }}\n提交: ${{ github.sha }}"}}'

    - name: Send DingTalk notification (failure)
      if: failure() && env.DINGTALK_WEBHOOK != ''
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        curl -X POST $DINGTALK_WEBHOOK -H 'Content-Type: application/json' -d '{"msgtype":"text","text":{"content":"❌ 自动化测试失败\n仓库: ${{ github.repository }}\n提交: ${{ github.sha }}"}}'