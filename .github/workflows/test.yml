name: Python Web Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auto_test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Chrome browser
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      id: test
      run: |
        pytest test_cases/ --alluredir=allure-results --reruns=2 --reruns-delay=1 -n auto

    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y allure

    - name: Generate Allure report
      run: allure generate allure-results -o allure-report --clean

    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: auto_test/allure-report

    - name: Send DingTalk notification (success)
      if: success() && env.DINGTALK_WEBHOOK != ''
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        curl -X POST $DINGTALK_WEBHOOK -H 'Content-Type: application/json' -d '{"msgtype":"text","text":{"content":"✅ 自动化测试通过\n仓库: ${{ github.repository }}\n提交: ${{ github.sha }}"}}'

    - name: Send DingTalk notification (failure)
      if: failure() && env.DINGTALK_WEBHOOK != ''
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        curl -X POST $DINGTALK_WEBHOOK -H 'Content-Type: application/json' -d '{"msgtype":"text","text":{"content":"❌ 自动化测试失败\n仓库: ${{ github.repository }}\n提交: ${{ github.sha }}"}}'